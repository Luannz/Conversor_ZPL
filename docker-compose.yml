version: '3.8'

services:
  zpl-converter:
    image: python:3.11-slim
    container_name: lynd-zpl-converter
    ports:
      - "8081:8000"
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn pillow python-multipart jinja2 && 
             cd /data/compose/* && 
             uvicorn main:app --host 0.0.0.0 --port 8000"
    restart: always