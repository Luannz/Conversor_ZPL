<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lynd - Conversor ZPL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h3 class="mb-0">Conversor de Imagem para ZPL Hex</h3>
            </div>
            <div class="card-body text-center">
                <p>Selecione uma imagem (PCX, PNG, JPG) para gerar o arquivo <strong>.GRF</strong></p>
                
                <div class="mb-4">
                    <input class="form-control" type="file" id="imageInput" accept="image/*,.pcx">
                </div>
                
                <button onclick="converter()" id="btnConverter" class="btn btn-primary btn-lg">
                    Converter e Baixar .GRF
                </button>
            </div>
        </div>
    </div>

    <script>
        async function converter() {
            const fileInput = document.getElementById('imageInput');
            const btn = document.getElementById('btnConverter');
            
            if (fileInput.files.length === 0) {
                alert("Por favor, selecione uma imagem!");
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            btn.innerText = "Processando...";
            btn.disabled = true;
            
            try {
                const response = await fetch('/convert', { 
                    method: 'POST', 
                    body: formData 
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || "Erro na conversão");
                }

                // 1. Recebe a resposta como um BLOB (Binary Large Object)
                const blob = await response.blob();
                
                // 2. Cria um link temporário na memória do navegador
                const url = window.URL.createObjectURL(blob);
                
                // 3. Simula um clique para baixar o arquivo
                const a = document.createElement('a');
                a.href = url;
                // Define o nome do arquivo baixado (mesmo nome original + .grf)
                const nomeOriginal = fileInput.files[0].name.split('.')[0];
                a.download = nomeOriginal + ".grf";
                
                document.body.appendChild(a);
                a.click();
                
                // 4. Limpa a memória
                window.URL.revokeObjectURL(url);
                a.remove();

            } catch (error) {
                console.error(error);
                alert("Erro: " + error.message);
            } finally {
                btn.innerText = "Converter e Baixar .GRF";
                btn.disabled = false;
            }
        }
    </script>
</body>
