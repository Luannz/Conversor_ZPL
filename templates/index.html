<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lynd - Conversor ZPL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h3 class="mb-0">Conversor de Imagem para ZPL</h3>
            </div>
            <div class="card-body">
                <p>Selecione uma logo ou ícone para converter em código de impressora Zebra.</p>
                
                <div class="mb-3">
                    <input class="form-control" type="file" id="imageInput" accept="image/*,.pcx">
                </div>
                <button onclick="converter()" class="btn btn-primary">Converter para ZPL</button>

                <hr>
                <h5>Resultado:</h5>
                <textarea id="resultado" class="form-control" rows="10" readonly placeholder="O código ZPL aparecerá aqui..."></textarea>
                <button onclick="copiar()" class="btn btn-sm btn-secondary mt-2">Copiar Código</button>
            </div>
        </div>
    </div>

    <script>
        async function converter() {
            const fileInput = document.getElementById('imageInput');
            const btn = document.querySelector('button');
            
            if (fileInput.files.length === 0) {
                alert("Por favor, selecione uma imagem!");
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            btn.innerText = "Convertendo...";
            
            try {
                const response = await fetch('/convert', { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById('resultado').value = data.zpl;
            } catch (error) {
                alert("Erro ao converter imagem.");
            } finally {
                btn.innerText = "Converter para ZPL";
            }
        }

        function copiar() {
            const area = document.getElementById('resultado');
            area.select();
            document.execCommand('copy');
            alert("Copiado para a área de transferência!");
        }
    </script>
</body>
</html>
